name: Build And Deploy YangsAI

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "tools/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build.yml"
  workflow_dispatch:

concurrency:
  group: deploy-yangsai-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      main: ${{ steps.filter.outputs.main }}
      benchmarks: ${{ steps.filter.outputs.benchmarks }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            main:
              - 'apps/main/**'
              - 'packages/**'
              - 'tools/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/build.yml'
            benchmarks:
              - 'apps/benchmarks/**'
              - 'packages/**'
              - 'tools/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/build.yml'

  build-and-deploy-main:
    name: Build And Deploy Main Site
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.main == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build main site
        run: npm run build:main

      - name: Deploy Main Site to Server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "./apps/main/dist/"
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_PORT: ${{ secrets.PORT }}
          REMOTE_USER: ${{ secrets.USER }}
          TARGET: ${{ secrets.TARGET_PUBLIC }}

  build-and-deploy-benchmarks:
    name: Build And Deploy Benchmarks Site
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.benchmarks == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build benchmarks site
        run: npm run build:benchmarks

      - name: Deploy Benchmarks Site to Server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "./apps/benchmarks/dist/"
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_PORT: ${{ secrets.PORT }}
          REMOTE_USER: ${{ secrets.USER }}
          TARGET: ${{ secrets.TARGET_PUBLIC_OF_BENCHMARKS }}